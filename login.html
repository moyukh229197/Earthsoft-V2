<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthsoft Login</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" type="image/png" sizes="any" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />
  <script>
    (function () {
      const AUTH_STORAGE_KEY = "earthsoft_auth_session";
      try {
        const saved = sessionStorage.getItem(AUTH_STORAGE_KEY);
        const auth = saved ? JSON.parse(saved) : null;
        if (auth?.authenticated) {
          window.location.replace("./index.html");
        }
      } catch (_) {
        sessionStorage.removeItem(AUTH_STORAGE_KEY);
      }
    })();
  </script>
  <script src="./background-beams.js" defer></script>
</head>

<body>
  <section class="login-screen" id="loginScreen" aria-labelledby="loginTitle">
    <div class="login-screen__panel glass-strong">
      <div class="login-screen__hero">
        <div class="login-screen__brand">
          <div class="login-screen__brand-icon glow-primary">
            <img src="./assets/logo_silhouette.png" alt="Earthsoft logo" />
          </div>
          <div class="login-screen__brand-copy">
            <p class="login-screen__eyebrow">EARTHWORK SUITE</p>
            <h1 id="loginTitle">Earthsoft Access</h1>
          </div>
        </div>
        <p class="login-screen__copy">Sign in to open the project workspace and continue with earthwork design, verification, and estimates.</p>
        <div class="login-screen__meta">
          <span><i class="ri-shield-keyhole-line"></i> Session-based local access</span>
          <span><i class="ri-line-chart-line"></i> Railway earthwork workspace</span>
        </div>
      </div>
      <form id="loginForm" class="login-form">
        <label class="login-field">
          <span>Username</span>
          <input id="loginUsername" type="text" autocomplete="username" placeholder="Enter your username" value="admin" />
        </label>
        <label class="login-field">
          <span>Password</span>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter your password" value="earthsoft123" />
        </label>
        <div class="login-credentials">
          <span><strong>Demo Login</strong></span>
          <span>Username: <strong>admin</strong></span>
          <span>Password: <strong>earthsoft123</strong></span>
        </div>
        <p id="loginError" class="login-error" aria-live="polite"></p>
        <button id="loginSubmitBtn" class="btn btn-primary login-submit" type="submit">
          <i class="ri-login-box-line" style="margin-right: 6px;"></i>
          Sign In
        </button>
      </form>
    </div>
  </section>

  <script>
    const AUTH_STORAGE_KEY = "earthsoft_auth_session";
    const AUTH_USERNAME = "admin";
    const AUTH_PASSWORD = "earthsoft123";

    const loginForm = document.getElementById("loginForm");
    const loginUsername = document.getElementById("loginUsername");
    const loginPassword = document.getElementById("loginPassword");
    const loginError = document.getElementById("loginError");
    const loginSubmitBtn = document.getElementById("loginSubmitBtn");

    function setLoginError(message) {
      if (loginError) loginError.textContent = message || "";
    }

    function attemptLogin() {
      const username = String(loginUsername?.value || "").trim();
      const password = String(loginPassword?.value || "").trim();

      if (!username || !password) {
        setLoginError("Enter both username and password to continue.");
        return;
      }

      if (username.toLowerCase() !== AUTH_USERNAME || password !== AUTH_PASSWORD) {
        setLoginError("Invalid username or password.");
        if (loginPassword) loginPassword.value = "";
        loginPassword?.focus();
        return;
      }

      sessionStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({
        authenticated: true,
        user: AUTH_USERNAME,
      }));
      window.location.replace("./index.html");
    }

    loginForm?.addEventListener("submit", (event) => {
      event.preventDefault();
      attemptLogin();
    });

    loginSubmitBtn?.addEventListener("click", (event) => {
      event.preventDefault();
      attemptLogin();
    });

    window.addEventListener("load", () => {
      loginUsername?.focus();
    });
  </script>
</body>

</html>
